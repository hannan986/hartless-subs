<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Hartle's Subs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;color:#111827;min-height:100vh;}

/* ─── LOGIN ─────────────────────────────────────────────── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1f2937 0%,#374151 100%);}
.login-card{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo-text{font-size:1.6rem;font-weight:800;letter-spacing:1px;color:#111827;}
.login-logo-text span{color:#E4002B;}
.login-logo-sub{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:#9ca3af;margin-top:.2rem;}
.login-title{font-size:1.15rem;font-weight:700;margin-bottom:.3rem;}
.login-sub{color:#6b7280;font-size:.875rem;margin-bottom:1.75rem;}
.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#374151;margin-bottom:.4rem;}
.form-group input{width:100%;padding:.7rem 1rem;border:1.5px solid #d1d5db;border-radius:8px;font-size:.95rem;outline:none;transition:border .2s,box-shadow .2s;}
.form-group input:focus{border-color:#E4002B;box-shadow:0 0 0 3px rgba(228,0,43,.12);}
.btn-primary{width:100%;background:#E4002B;color:#fff;border:none;border-radius:8px;padding:.8rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:.3rem;}
.btn-primary:hover{background:#c20024;}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;}
.error-msg{color:#dc2626;font-size:.84rem;margin-top:.8rem;text-align:center;min-height:1.2em;}

/* ─── ADMIN PANEL ───────────────────────────────────────── */
#adminPanel{display:none;min-height:100vh;flex-direction:column;}
.admin-header{background:#1f2937;color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.admin-logo-text{font-size:1rem;font-weight:800;letter-spacing:.5px;}
.admin-logo-text span{color:#E4002B;}
.admin-user-email{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:.15rem;}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.85);padding:.45rem 1rem;border-radius:6px;cursor:pointer;font-size:.82rem;transition:background .2s;}
.btn-logout:hover{background:rgba(255,255,255,.2);}

.admin-content{max-width:1000px;margin:0 auto;padding:1.5rem;}

/* ─── STATUS ────────────────────────────────────────────── */
.status-bar{padding:.75rem 1rem;border-radius:8px;margin-bottom:1.5rem;font-size:.875rem;display:flex;align-items:center;gap:.6rem;font-weight:600;}
.status-bar.ok{background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;}
.status-bar.loading{background:#fef3c7;border:1px solid #fcd34d;color:#92400e;}
.status-bar.error{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;}

/* ─── CATEGORY FILTER ───────────────────────────────────── */
.cat-filter{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.cat-btn{padding:.42rem .9rem;border:1.5px solid #d1d5db;border-radius:20px;font-size:.8rem;font-weight:700;background:#fff;cursor:pointer;transition:all .18s;white-space:nowrap;color:#374151;}
.cat-btn.active,.cat-btn:hover{background:#E4002B;border-color:#E4002B;color:#fff;}

/* ─── ITEMS TABLE ───────────────────────────────────────── */
.items-table{background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:5rem;}
.items-table-hdr{display:grid;grid-template-columns:1fr 110px 110px 80px;padding:.7rem 1.2rem;background:#f9fafb;border-bottom:1px solid #e5e7eb;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;}
.item-row{display:grid;grid-template-columns:1fr 110px 110px 80px;padding:.85rem 1.2rem;border-bottom:1px solid #f3f4f6;align-items:center;transition:background .15s;}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:#fafafa;}
.item-row.changed{background:#fffbeb;}
.item-name{font-size:.88rem;font-weight:700;color:#111827;}
.item-cat{font-size:.72rem;color:#9ca3af;margin-top:.1rem;}
.item-firebase{font-size:.72rem;color:#059669;margin-top:.1rem;}
.item-default{font-size:.88rem;color:#6b7280;}
.price-input{width:88px;padding:.42rem .6rem;border:1.5px solid #d1d5db;border-radius:6px;font-size:.9rem;font-weight:700;color:#E4002B;outline:none;transition:border .2s;background:#fff;}
.price-input:focus{border-color:#E4002B;box-shadow:0 0 0 2px rgba(228,0,43,.1);}
.price-input.changed{border-color:#f59e0b;background:#fffbeb;}
.save-row-btn{padding:.38rem .75rem;border:1.5px solid #E4002B;color:#E4002B;background:none;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;opacity:0;pointer-events:none;}
.item-row.changed .save-row-btn{opacity:1;pointer-events:auto;}
.save-row-btn:hover{background:#E4002B;color:#fff;}

/* ─── SAVE BAR ──────────────────────────────────────────── */
.save-all-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:50;}
.changed-count{font-size:.875rem;color:#6b7280;}
.changed-count strong{color:#111827;font-size:1rem;}
.btn-save-all{background:#E4002B;color:#fff;border:none;border-radius:8px;padding:.75rem 2.2rem;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-save-all:hover{background:#c20024;}
.btn-save-all:disabled{opacity:.5;cursor:not-allowed;}

/* ─── TOAST ─────────────────────────────────────────────── */
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);color:#fff;padding:.75rem 1.75rem;border-radius:8px;font-size:.88rem;font-weight:700;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.2);opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:600px){
  .items-table-hdr{grid-template-columns:1fr 90px 80px;}
  .item-row{grid-template-columns:1fr 90px 80px;}
  .items-table-hdr>*:last-child,.item-row>*:last-child{display:none;}
  .admin-content{padding:1rem;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">Hartle's <span>Subs</span></div>
      <div class="login-logo-sub">Admin Panel</div>
    </div>
    <div class="login-title">Sign In</div>
    <div class="login-sub">Enter your admin credentials to manage menu prices.</div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="admin@hartlessubs.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      <div class="error-msg" id="loginError"></div>
    </form>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div>
      <div class="admin-logo-text">Hartle's <span>Subs</span> — Menu Prices</div>
      <div class="admin-user-email" id="adminUserEmail"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sign Out</button>
  </div>

  <div class="admin-content">
    <div id="statusBar" class="status-bar loading">⏳ Loading menu data…</div>
    <div class="cat-filter" id="catFilter"></div>
    <div class="items-table">
      <div class="items-table-hdr">
        <div>Item Name</div>
        <div>Default $</div>
        <div>Set Price</div>
        <div>Action</div>
      </div>
      <div id="itemsList"></div>
    </div>
  </div>

  <div class="save-all-bar">
    <div class="changed-count"><strong id="changedCountNum">0</strong> unsaved changes</div>
    <button class="btn-save-all" id="saveAllBtn" onclick="saveAll()" disabled>Save All Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="firebase-config.js"></script>

var db, auth;
var currentCat  = 'All';
var fbPrices    = {};
var localChanges= {};

// Init Firebase
var app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(window.FIREBASE_CONFIG);
auth = firebase.auth(app);
db   = firebase.firestore(app);

auth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display  = 'flex';
    document.getElementById('adminUserEmail').textContent = user.email;
    loadPrices();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display  = 'none';
  }
});

document.getElementById('loginForm').onsubmit = function(e){
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginError');
  btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
  auth.signInWithEmailAndPassword(
    document.getElementById('emailInput').value.trim(),
    document.getElementById('passInput').value
  ).catch(function(){
    err.textContent = 'Invalid email or password.';
    btn.disabled = false; btn.textContent = 'Sign In';
  });
};

function doLogout(){
  if(confirm('Sign out?')) auth.signOut();
}

function loadPrices(){
  setStatus('loading','⏳ Loading prices from Firebase…');
  db.collection('menuItems').get().then(function(snap){
    snap.forEach(function(doc){
      var d = doc.data();
      if(d.name && d.price !== undefined) fbPrices[d.name] = d.price;
    });
    setStatus('ok','✅ Connected — '+snap.size+' items in Firebase. Default prices shown for anything not yet saved.');
    renderPrices();
  }).catch(function(e){
    setStatus('error','⚠️ Firebase error: '+e.message);
    renderPrices();
  });
}

function renderPrices(){
  // Category buttons
  var allCats = ['All'].concat(MENU.map(function(g){return g.cat;}));
  document.getElementById('catFilter').innerHTML = allCats.map(function(c){
    return '<button class="cat-btn'+(c===currentCat?' active':'')+'" onclick="filterCat(\''+c.replace(/'/g,"\\'")+'\')">'+(c==='All'?'All Categories':c)+'</button>';
  }).join('');

  // Items
  var html = '';
  MENU.forEach(function(group){
    if(currentCat !== 'All' && currentCat !== group.cat) return;
    group.items.forEach(function(item){
      var fbPrice  = fbPrices[item.name] !== undefined ? fbPrices[item.name] : null;
      var showVal  = localChanges[item.name] !== undefined
        ? localChanges[item.name]
        : (fbPrice !== null ? fbPrice : item.price);
      var isChanged = localChanges[item.name] !== undefined;
      var eid = slugify(item.name);
      html += '<div class="item-row'+(isChanged?' changed':'')+'" id="row-'+eid+'">'
        +'<div>'
        +'<div class="item-name">'+escHtml(item.name)+'</div>'
        +'<div class="item-cat">'+group.emoji+' '+group.cat+'</div>'
        +(fbPrice!==null?'<div class="item-firebase">Firebase: $'+fbPrice.toFixed(2)+'</div>':'')
        +'</div>'
        +'<div class="item-default">$'+item.price.toFixed(2)+'</div>'
        +'<input type="number" min="0" step="0.01" class="price-input'+(isChanged?' changed':'')+'"'
        +' id="inp-'+eid+'" value="'+parseFloat(showVal).toFixed(2)+'"'
        +' onchange="onChange(\''+escAttr(item.name)+'\',this.value)"'
        +' oninput="onChange(\''+escAttr(item.name)+'\',this.value)"/>'
        +'<button class="save-row-btn" onclick="saveOne(\''+escAttr(item.name)+'\',this)">Save</button>'
        +'</div>';
    });
  });
  document.getElementById('itemsList').innerHTML = html;
  updateCount();
}

function filterCat(cat){ currentCat = cat; renderPrices(); }

function onChange(name, val){
  var n = parseFloat(val);
  if(isNaN(n) || n < 0) return;
  localChanges[name] = n;
  var eid = slugify(name);
  var row = document.getElementById('row-'+eid);
  var inp = document.getElementById('inp-'+eid);
  if(row) row.classList.add('changed');
  if(inp) inp.classList.add('changed');
  updateCount();
}

function updateCount(){
  var n = Object.keys(localChanges).length;
  document.getElementById('changedCountNum').textContent = n;
  document.getElementById('saveAllBtn').disabled = n === 0;
}

function saveOne(name, btn){
  var price = localChanges[name];
  if(price === undefined) return;
  btn.textContent = '…'; btn.disabled = true;
  db.collection('menuItems').doc(firestoreId(name))
    .set({name: name, price: price}, {merge: true})
    .then(function(){
      fbPrices[name] = price;
      delete localChanges[name];
      renderPrices();
      toast('Saved: '+name);
    })
    .catch(function(e){
      toast('Error: '+e.message, true);
      btn.textContent = 'Save'; btn.disabled = false;
    });
}

function saveAll(){
  var names = Object.keys(localChanges);
  if(!names.length) return;
  var btn = document.getElementById('saveAllBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  var batch = db.batch();
  names.forEach(function(name){
    batch.set(
      db.collection('menuItems').doc(firestoreId(name)),
      {name: name, price: localChanges[name]},
      {merge: true}
    );
  });
  batch.commit().then(function(){
    names.forEach(function(n){ fbPrices[n] = localChanges[n]; delete localChanges[n]; });
    renderPrices();
    toast(names.length+' item'+(names.length>1?'s':'')+' saved!');
    btn.textContent = 'Save All Changes';
  }).catch(function(e){
    toast('Error: '+e.message, true);
    btn.textContent = 'Save All Changes'; btn.disabled = false;
  });
}

function setStatus(type, msg){
  var bar = document.getElementById('statusBar');
  bar.className = 'status-bar '+type;
  bar.textContent = msg;
}

var _tt;
function toast(msg, isError){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#dc2626' : '#059669';
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9]/g,'-'); }
function firestoreId(s){ return s.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
</script>
</body>
</html>
